<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>认知镜</title>
<style>
/* ============ 基础 ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d0d;
  --text: #d4d4d4;
  --text-dim: #666;
  --text-bright: #fff;
  --border: #2a2a2a;
  --card-bg: #141414;
  --input-bg: #1a1a1a;
  --accent: #6b7fff;
  --ur-bg-start: #1a0a2e; --ur-bg-end: #2d1b4e; --ur-border: #d4a843;
  --ssr-bg-start: #0a1628; --ssr-bg-end: #1a2a4a; --ssr-border: #6b7fff;
  --sr-bg: #0d1f2d; --sr-border: #3a8fa0;
  --r-bg: #151e26; --r-border: #3a4a5a;
  --n-bg: #1a1a1a; --n-border: #3a3a3a;
  --transition: 0.4s cubic-bezier(0.22, 1, 0.36, 1);
}
html, body { height: 100%; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.7;
  -webkit-font-smoothing: antialiased;
}
a { color: var(--accent); text-decoration: none; }
/* ============ 视图容器 ============ */
.view { display: none; width: 100%; min-height: 100vh; }
.view.active { display: flex; flex-direction: column; align-items: center; }
/* ============ 首页 ============ */
#home-view {
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
}
.hero-title {
  font-size: clamp(2rem, 6vw, 3.6rem);
  font-weight: 700;
  color: var(--text-bright);
  line-height: 1.3;
  margin-bottom: 16px;
  letter-spacing: -0.02em;
}
.hero-sub {
  font-size: clamp(0.95rem, 2vw, 1.15rem);
  color: var(--text-dim);
  margin-bottom: 48px;
  line-height: 1.6;
}
.input-area {
  width: 100%;
  max-width: 560px;
  text-align: left;
}
.input-area label {
  font-size: 0.9rem;
  color: var(--text-dim);
  display: block;
  margin-bottom: 8px;
}
.input-area textarea {
  width: 100%;
  min-height: 120px;
  background: var(--input-bg);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  font-size: 1rem;
  padding: 16px;
  resize: vertical;
  font-family: inherit;
  line-height: 1.6;
  transition: border-color var(--transition);
}
.input-area textarea:focus { outline: none; border-color: var(--accent); }
.input-area textarea::placeholder { color: #555; }
.scene-input {
  margin-top: 16px;
}
.scene-input textarea {
  min-height: 64px;
  font-size: 0.9rem;
}
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  background: var(--accent);
  color: #fff;
  border: none;
  border-radius: 40px;
  padding: 14px 36px;
  font-size: 1rem;
  font-weight: 600;
  cursor: pointer;
  transition: all var(--transition);
  margin-top: 24px;
}
.btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(107,127,255,0.25); }
.btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
.api-key-bar {
  position: fixed; top: 0; left: 0; right: 0;
  background: #1a1a2e;
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  z-index: 100;
  font-size: 0.8rem;
  color: var(--text-dim);
}
.api-key-bar input {
  background: #0d0d0d;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  padding: 4px 10px;
  font-size: 0.8rem;
  width: 260px;
  font-family: monospace;
}
.api-key-bar .btn-small {
  padding: 4px 12px;
  font-size: 0.75rem;
  border-radius: 4px;
  background: var(--accent);
  color: #fff;
  border: none;
  cursor: pointer;
}
.api-status { font-size: 0.75rem; margin-left: 4px; }
.api-status.ok { color: #4ade80; }
.api-status.fail { color: #f87171; }
/* ============ 等待序列 ============ */
#waiting-view {
  justify-content: center;
  padding: 48px 24px;
  min-height: 100vh;
}
.waiting-sequence {
  position: relative;
  font-size: 1.2rem;
  color: var(--text-dim);
  line-height: 2.8;
  text-align: center;
}
.waiting-line {
  opacity: 0;
  transition: opacity 0.6s ease;
}
.waiting-line.visible { opacity: 1; }
.waiting-line.highlight { color: var(--text-bright); font-size: 1.5rem; font-weight: 600; }
.waiting-line.presence {
  color: var(--text-bright);
  font-size: 2rem;
  font-weight: 700;
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  text-align: center;
  animation: fadeInUp 1s ease forwards;
}
@keyframes fadeInUp {
  from { opacity: 0; transform: translate(-50%, -50%) translateY(20px); }
  to { opacity: 1; transform: translate(-50%, -50%) translateY(0); }
}
/* ============ 结果卡片 ============ */
#result-view {
  padding: 40px 24px;
  min-height: 100vh;
  justify-content: flex-start;
  padding-top: 60px;
}
.result-card {
  width: 100%;
  max-width: 620px;
  border-radius: 20px;
  padding: 40px 32px;
  position: relative;
  overflow: hidden;
  transform: translateY(60px);
  opacity: 0;
  transition: all 0.8s cubic-bezier(0.22, 1, 0.36, 1);
}
.result-card.reveal { transform: translateY(0); opacity: 1; }
/* 稀有度背景 */
.result-card.rarity-ur {
  background: linear-gradient(135deg, var(--ur-bg-start), var(--ur-bg-end));
  border: 1px solid var(--ur-border);
  box-shadow: 0 0 40px rgba(212,168,67,0.1);
}
.result-card.rarity-ssr {
  background: linear-gradient(135deg, var(--ssr-bg-start), var(--ssr-bg-end));
  border: 1px solid var(--ssr-border);
  box-shadow: 0 0 30px rgba(107,127,255,0.08);
}
.result-card.rarity-sr { background: var(--sr-bg); border: 1px solid var(--sr-border); }
.result-card.rarity-r { background: var(--r-bg); border: 1px solid var(--r-border); }
.result-card.rarity-n { background: var(--n-bg); border: 1px solid var(--n-border); }
/* UR 金光边框动画 */
@keyframes ur-glow {
  0%, 100% { border-color: var(--ur-border); box-shadow: 0 0 20px rgba(212,168,67,0.1); }
  50% { border-color: #f0d080; box-shadow: 0 0 40px rgba(212,168,67,0.25); }
}
.result-card.rarity-ur.animate { animation: ur-glow 3s ease-in-out infinite; }
/* SSR 辉光 */
@keyframes ssr-glow {
  0%, 100% { box-shadow: 0 0 20px rgba(107,127,255,0.05); }
  50% { box-shadow: 0 0 40px rgba(107,127,255,0.15); }
}
.result-card.rarity-ssr.animate { animation: ssr-glow 4s ease-in-out infinite; }
.rarity-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 14px;
  border-radius: 20px;
  font-size: 0.75rem;
  font-weight: 700;
  letter-spacing: 0.04em;
  margin-bottom: 20px;
  opacity: 0;
  transform: scale(0.8);
  transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.rarity-badge.reveal { opacity: 1; transform: scale(1); }
.rarity-badge.ur { background: var(--ur-border); color: #1a0a2e; }
.rarity-badge.ssr { background: var(--ssr-border); color: #0a1628; }
.rarity-badge.sr { background: var(--sr-border); color: #0d1f2d; }
.rarity-badge.r { background: var(--r-border); color: #151e26; }
.rarity-badge.n { background: var(--n-border); color: #aaa; }
.card-user-input {
  font-size: 0.85rem;
  color: var(--text-dim);
  border-left: 2px solid var(--border);
  padding-left: 16px;
  margin-bottom: 24px;
  line-height: 1.6;
}
.card-section-label {
  font-size: 0.75rem;
  color: var(--text-dim);
  letter-spacing: 0.06em;
  text-transform: uppercase;
  margin-bottom: 6px;
  margin-top: 20px;
}
.card-section-label:first-of-type { margin-top: 0; }
.card-threads {
  font-size: 1rem;
  line-height: 1.8;
  color: var(--text-bright);
}
.card-threads .thread-sep {
  color: var(--text-dim);
  margin: 0 8px;
}
.card-root { font-size: 0.95rem; line-height: 1.7; }
.card-root .root-label { color: var(--text-dim); font-size: 0.85rem; }
.card-root .root-quote { color: var(--text-bright); font-weight: 500; }
.card-pattern-box {
  background: rgba(255,255,255,0.04);
  border-radius: 12px;
  padding: 20px;
  margin: 20px 0;
  text-align: center;
}
.card-pattern-name {
  font-size: 1.6rem;
  font-weight: 700;
  color: var(--text-bright);
  letter-spacing: 0.02em;
  margin-bottom: 8px;
}
.card-pattern-fields {
  font-size: 0.85rem;
  color: var(--text-dim);
}
.card-shell {
  font-size: 1.05rem;
  color: var(--text-bright);
  line-height: 1.7;
  border-top: 1px solid rgba(255,255,255,0.06);
  padding-top: 20px;
  margin-top: 20px;
}
.card-presence {
  margin-top: 28px;
  padding-top: 24px;
  border-top: 2px solid rgba(255,255,255,0.1);
  text-align: center;
}
.card-presence-text {
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--text-bright);
  line-height: 1.5;
}
.card-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  margin-top: 32px;
}
.card-actions button {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--text-dim);
  padding: 8px 20px;
  border-radius: 20px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all var(--transition);
}
.card-actions button:hover { background: rgba(255,255,255,0.1); color: var(--text); }
.material-hint {
  text-align: center;
  margin-top: 16px;
  font-size: 0.8rem;
  color: var(--text-dim);
  opacity: 0.7;
}
.material-hint button {
  background: none;
  border: none;
  color: var(--accent);
  cursor: pointer;
  font-size: 0.8rem;
  text-decoration: underline;
}
.btn-back {
  position: fixed;
  top: 16px;
  left: 16px;
  background: rgba(255,255,255,0.06);
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 8px 16px;
  border-radius: 20px;
  font-size: 0.8rem;
  cursor: pointer;
  z-index: 50;
  transition: all var(--transition);
}
.btn-back:hover { background: rgba(255,255,255,0.1); color: var(--text); }
/* ============ 历史墙 ============ */
#history-view {
  padding: 40px 24px;
  min-height: 100vh;
  padding-top: 60px;
}
.history-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 16px;
  width: 100%;
  max-width: 900px;
  margin-top: 24px;
}
.history-card {
  border-radius: 14px;
  padding: 20px;
  cursor: pointer;
  transition: all var(--transition);
  font-size: 0.85rem;
  position: relative;
  min-height: 100px;
}
.history-card:hover { transform: translateY(-4px); }
.history-card .h-title {
  font-weight: 600;
  color: var(--text-bright);
  margin-bottom: 8px;
  font-size: 0.95rem;
}
.history-card .h-preview { color: var(--text-dim); line-height: 1.5; }
.history-card .h-rarity {
  position: absolute;
  top: 12px;
  right: 12px;
  font-size: 0.7rem;
  font-weight: 700;
  padding: 2px 8px;
  border-radius: 8px;
}
.history-card .h-material-tag {
  position: absolute;
  top: 12px;
  left: 12px;
  font-size: 0.65rem;
  color: var(--accent);
  border: 1px solid var(--accent);
  padding: 2px 6px;
  border-radius: 4px;
}
.history-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  width: 100%;
  max-width: 900px;
  margin-bottom: 8px;
}
.history-header h2 { font-size: 1.3rem; color: var(--text-bright); }
.history-tabs {
  display: flex;
  gap: 8px;
  margin-bottom: 16px;
}
.history-tabs button {
  background: none;
  border: 1px solid var(--border);
  color: var(--text-dim);
  padding: 6px 14px;
  border-radius: 16px;
  font-size: 0.8rem;
  cursor: pointer;
  transition: all var(--transition);
}
.history-tabs button.active { border-color: var(--accent); color: var(--accent); }
/* ============ 素材库 ============ */
.material-view-tab {
  margin-bottom: 16px;
}
/* footer nav */
.nav-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: center;
  gap: 24px;
  padding: 12px;
  background: rgba(13,13,13,0.9);
  backdrop-filter: blur(10px);
  border-top: 1px solid var(--border);
  z-index: 50;
}
.nav-bar button {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 0.8rem;
  cursor: pointer;
  padding: 4px 12px;
  transition: color var(--transition);
}
.nav-bar button:hover, .nav-bar button.active { color: var(--text-bright); }
</style>
</head>
<body>

<!-- API Key Bar -->
<div class="api-key-bar" id="api-key-bar">
  <span>🔑</span>
  <input type="password" id="api-key-input" placeholder="输入DeepSeek API Key" />
  <button class="btn-small" onclick="saveApiKey()">保存</button>
  <span class="api-status" id="api-status"></span>
</div>

<!-- ===== 首页 ===== -->
<div class="view active" id="home-view">
  <h1 class="hero-title">你身上缠着几根线？</h1>
  <p class="hero-sub">不是分析，不是建议。<br>是找到线头，给你距离。</p>
  <div class="input-area">
    <label>你现在被什么缠着？</label>
    <textarea id="main-input" placeholder="一句话也好，一段场景也好&#10;&#10;试试描述那个让你不舒服的瞬间"></textarea>
    <div class="scene-input">
      <label>有没有一个最近的具体场景？（可选）</label>
      <textarea id="scene-input" placeholder="不加也行，有了会更准"></textarea>

    <button class="btn" id="submit-btn" onclick="startDecoupling()">拉开距离 →</button>

</div>

<!-- ===== 等待 ===== -->
<div class="view" id="waiting-view">
  <div class="waiting-sequence" id="waiting-sequence">
    <div class="waiting-line" data-delay="500">正在看见缠绕中的线...</div>
    <div class="waiting-line" data-delay="3000">找到了线头...</div>
    <div class="waiting-line" data-delay="5500">回到那个场景...</div>
    <div class="waiting-line" data-delay="8000" data-highlight="true">在吗？</div>
  </div>
</div>

<!-- ===== 结果 ===== -->
<div class="view" id="result-view">
  <button class="btn-back" onclick="goHome()">← 再来一次</button>
  <div class="result-card" id="result-card">
    <div class="rarity-badge" id="rarity-badge"></div>
    <div class="card-user-input" id="card-user-input"></div>
    <div class="card-section-label">—— 你以为你在问 ——</div>
    <div id="card-surface"></div>
    <div class="card-section-label">—— 其实你在处理的是 ——</div>
    <div class="card-threads" id="card-threads"></div>
    <div class="card-section-label">—— 追到根 ——</div>
    <div class="card-root" id="card-root"></div>
    <div class="card-pattern-box" id="card-pattern-box">
      <div class="card-pattern-name" id="card-pattern-name"></div>
      <div class="card-pattern-fields" id="card-pattern-fields"></div>
    </div>
    <div class="card-section-label">—— 壳在这里 ——</div>
    <div class="card-shell" id="card-shell"></div>
    <div class="card-presence">
      <div class="card-presence-text" id="card-presence-text"></div>
    </div>
    <div class="card-actions">
      <button onclick="saveCard()">保存</button>
      <button onclick="shareCard()">分享截图</button>
    </div>
    <div class="material-hint" id="material-hint" style="display:none">
      这个看见可能值得写出来
      <button onclick="markMaterial()">标记为素材 →</button>
    </div>
  </div>
</div>

<!-- ===== 历史 ===== -->
<div class="view" id="history-view">
  <button class="btn-back" onclick="goHome()">← 首页</button>
  <div class="history-header">
    <h2 id="history-title">卡片墙</h2>
  </div>
  <div class="history-tabs" id="history-tabs">
    <button class="active" onclick="showHistoryTab('all')">全部</button>
    <button onclick="showHistoryTab('material')">素材库</button>
    <button onclick="showHistoryTab('ur')">UR</button>
    <button onclick="showHistoryTab('ssr')">SSR</button>
  </div>
  <div class="history-grid" id="history-grid"></div>
</div>

<!-- ===== 底部导航 ===== -->
<div class="nav-bar">
  <button class="active" onclick="goHome()">照镜子</button>
  <button onclick="showHistory()">卡片墙</button>
</div>

<script>
// ============================================================
//  SYSTEM PROMPT
// ============================================================
const SYSTEM_PROMPT = `你是一个"解耦镜"——不是分析师，不是顾问，不是治疗师。

你的唯一能力：看见一个人身上缠在一起的线，找到线头，给出距离。

【绝对禁止】
× 给建议
× 分类打标签（焦虑型/回避型/etc）
× 说"这说明你…"
× 使用"问题""困扰""负面情绪"等泛化词
× 给结论性答案

【你必须做的五件事】
1. 追问到根：在脑内模拟追问，直到找到那个最底层假设（"凭什么觉得…"的那个根）
2. 命名缠绕模式：找到这个人特有的模式，用3-8个字命名，不用通用术语
3. 回到具体场景：不是道理，是那个画面
4. 指壳不砸壳："我能让你看到壳，破不破是你的事"
5. 最后确认"在吗"：一句话，让人知道自己被看见了

【输出格式——严格执行，使用分隔符】

---THREADS---
线1：[具体描述这根线是什么，用这个人自己的语言]
线2：[具体描述]
线3（如果有）：[具体描述]
缠绕点：[它们在哪里纠结在一起，一句话]

---ROOT---
你说的是：[用户表面的问题]
追到根是：[最底层假设，往往令人意外]
这个假设是怎么来的：[一个具体场景或时刻，不是道理]

---PATTERN---
命名：[3-8字，只属于这个人的模式名称]
这个模式同时出现在：[2-3个不同领域，逗号分隔]
一句话描述：[这个模式在运作时的样子]

---SHELL---
壳是：[一句话，精准指出]
（只指不砸，不解释如何打破）

---PRESENCE---
[最后一句——"在吗"的变体。让人感觉被看见，不是被总结。不超过30字]

---RARITY---
等级：[UR/SSR/SR/R/N]
判断依据：[一句话说明]

判断稀有度时，先自问：
1. 这个缠绕组合换一个人来问，我会给同样的缠绕吗？不会=向UR/SSR
2. 我给出的命名是我为这个人创造的，还是通用术语？专属=向UR
3. 追到根之后，这个根令人意外吗？意外=SSR或UR
4. 场景描述击中了吗？用户会强烈认出那个画面？强烈=SR
5. 这个问题换一个人来问也会得到差不多的答案？是=R或N

判定规则：
- UR：缠绕组合独特 + 命名专属 + 根意外，三者同时成立
- SSR：根意外，或命名让人AHA（只需其中之一）
- SR：场景精准击中，用户会认出
- R：有价值的问题，但答案不特别专属
- N：普遍性问题，通用性答案`;

// ============================================================
//  STATE
// ============================================================
let currentCard = null;
let allCards = JSON.parse(localStorage.getItem('cm_cards') || '[]');

// ============================================================
//  API
// ============================================================
function getApiKey() { return localStorage.getItem('deepseek_api_key') || ''; }
function saveApiKey() {
  const key = document.getElementById('api-key-input').value.trim();
  if (!key) return;
  localStorage.setItem('deepseek_api_key', key);
  document.getElementById('api-status').textContent = '✓';
  document.getElementById('api-status').className = 'api-status ok';
}
function loadApiKey() {
  const key = getApiKey();
  if (key) {
    document.getElementById('api-key-input').value = key;
    document.getElementById('api-status').textContent = '✓';
    document.getElementById('api-status').className = 'api-status ok';
  }
}

async function callDeepSeek(userInput, sceneInput) {
  const apiKey = getApiKey();
  if (!apiKey) throw new Error('请先设置 API Key');

  let userMsg = userInput;
  if (sceneInput) userMsg += `\n\n最近有一个具体场景：${sceneInput}`;

  const resp = await fetch('https://api.deepseek.com/chat/completions', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${apiKey}`
    },
    body: JSON.stringify({
      model: 'deepseek-chat',
      messages: [
        { role: 'system', content: SYSTEM_PROMPT },
        { role: 'user', content: userMsg }
      ],
      stream: false,
      temperature: 0.85,
      max_tokens: 1200
    })
  });

  if (!resp.ok) {
    const err = await resp.text();
    throw new Error(`API 错误 ${resp.status}: ${err.slice(0,100)}`);
  }

  const data = await resp.json();
  return data.choices[0].message.content;
}

// ============================================================
//  PARSER
// ============================================================
function parseOutput(raw) {
  const sections = {};
  const markers = ['THREADS', 'ROOT', 'PATTERN', 'SHELL', 'PRESENCE', 'RARITY'];
  markers.forEach(marker => {
    const regex = new RegExp(`---${marker}---([\\s\\S]*?)(?=---\\w+---|$)`, 'g');
    const match = regex.exec(raw);
    if (match) sections[marker] = match[1].trim();
  });

  if (sections.RARITY) {
    const levelMatch = sections.RARITY.match(/等级[：:]\s*(UR|SSR|SR|R|N)/i);
    sections.LEVEL = levelMatch ? levelMatch[1].toUpperCase() : 'N';
  } else {
    sections.LEVEL = 'N';
  }

  return sections;
}

function buildUserMessage(input, scene) {
  let msg = input;
  if (scene) msg += `\n\n最近有一个具体场景：${scene}`;
  return msg;
}

// ============================================================
//  CARD RENDER
// ============================================================
function renderCard(sections, userInput) {
  const card = document.getElementById('result-card');
  card.className = 'result-card';
  card.classList.remove('reveal', 'animate');

  const level = sections.LEVEL || 'N';
  const levelClass = level.toLowerCase();

  // 稀有度徽章
  const badge = document.getElementById('rarity-badge');
  badge.textContent = level;
  badge.className = `rarity-badge ${levelClass}`;
  badge.classList.remove('reveal');

  // 用户输入
  document.getElementById('card-user-input').textContent = `「${userInput.slice(0,120)}${userInput.length > 120 ? '...' : ''}」`;

  // 你以为你在问
  if (sections.ROOT) {
    const rootMatch = sections.ROOT.match(/你说的是[：:]([\s\S]*?)(?=追到根|$)/);
    document.getElementById('card-surface').textContent = rootMatch ? rootMatch[1].trim() : sections.ROOT.slice(0,60);
  }

  // THREADS
  if (sections.THREADS) {
    document.getElementById('card-threads').innerHTML = sections.THREADS.replace(/\n/g, '<br>');
  }

  // ROOT
  if (sections.ROOT) {
    document.getElementById('card-root').innerHTML = sections.ROOT.replace(/\n/g, '<br>');
  }

  // PATTERN
  if (sections.PATTERN) {
    const nameMatch = sections.PATTERN.match(/命名[：:]\s*(.+)/);
    const fieldsMatch = sections.PATTERN.match(/同时出现在[：:]\s*(.+)/);
    const descMatch = sections.PATTERN.match(/描述[：:]\s*(.+)/);

    document.getElementById('card-pattern-name').textContent = nameMatch ? nameMatch[1].trim() : '';
    const fields = fieldsMatch ? fieldsMatch[1].trim() : '';
    const desc = descMatch ? descMatch[1].trim() : '';
    document.getElementById('card-pattern-fields').textContent = [fields, desc].filter(Boolean).join(' · ');
    document.getElementById('card-pattern-box').style.display = (nameMatch || fieldsMatch) ? '' : 'none';
  } else {
    document.getElementById('card-pattern-box').style.display = 'none';
  }

  // SHELL
  if (sections.SHELL) {
    document.getElementById('card-shell').innerHTML = sections.SHELL.replace(/\n/g, '<br>');
  }

  // PRESENCE
  if (sections.PRESENCE) {
    document.getElementById('card-presence-text').textContent = sections.PRESENCE;
  }

  // 稀有度样式
  card.classList.add(`rarity-${levelClass}`);

  // 素材提示 (SSR/UR)
  const hint = document.getElementById('material-hint');
  hint.style.display = (level === 'UR' || level === 'SSR') ? '' : 'none';

  // 动效触发序列
  setTimeout(() => {
    badge.classList.add('reveal');
    card.classList.add('reveal');
    setTimeout(() => {
      card.classList.add('animate');
    }, 500);
  }, 100);

  // 保存当前卡片
  currentCard = { sections, userInput, level, timestamp: Date.now(), material: false };
}

// ============================================================
//  STORAGE
// ============================================================
function saveCard() {
  if (!currentCard) return;
  const exists = allCards.some(c => c.timestamp === currentCard.timestamp);
  if (!exists) {
    allCards.push({ ...currentCard });
    localStorage.setItem('cm_cards', JSON.stringify(allCards));
  }
}

function markMaterial() {
  if (!currentCard) return;
  saveCard();
  const idx = allCards.findIndex(c => c.timestamp === currentCard.timestamp);
  if (idx >= 0) {
    allCards[idx].material = true;
    localStorage.setItem('cm_cards', JSON.stringify(allCards));
  }
  document.getElementById('material-hint').style.display = 'none';
}

async function shareCard() {
  await saveCard();
  const card = document.getElementById('result-card');
  try {
    const canvas = await html2canvas(card, { backgroundColor: '#0d0d0d', scale: 2 });
    const link = document.createElement('a');
    link.download = `认知镜-${Date.now()}.png`;
    link.href = canvas.toDataURL();
    link.click();
  } catch(e) {
    // fallback
  }
}

// ============================================================
//  VIEW NAV
// ============================================================
function showView(id) {
  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  window.scrollTo(0, 0);
}

function goHome() {
  showView('home-view');
  document.getElementById('submit-btn').disabled = false;
}

function showHistory() {
  showView('history-view');
  renderHistory('all');
}

function showHistoryTab(tab) {
  document.querySelectorAll('.history-tabs button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  if (tab === 'material') document.getElementById('history-title').textContent = '素材库';
  else if (tab === 'ur') document.getElementById('history-title').textContent = 'UR 卡片';
  else if (tab === 'ssr') document.getElementById('history-title').textContent = 'SSR 卡片';
  else document.getElementById('history-title').textContent = '卡片墙';
  renderHistory(tab);
}

function renderHistory(tab) {
  const grid = document.getElementById('history-grid');
  let cards = allCards;

  if (tab === 'material') cards = cards.filter(c => c.material);
  else if (tab === 'ur') cards = cards.filter(c => c.level === 'UR');
  else if (tab === 'ssr') cards = cards.filter(c => c.level === 'SSR');

  if (cards.length === 0) {
    grid.innerHTML = '<p style="color:#666;text-align:center;padding:40px;">还没有卡片</p>';
    return;
  }

  cards.sort((a, b) => b.timestamp - a.timestamp);

  grid.innerHTML = cards.map(c => {
    const lc = c.level.toLowerCase();
    const presence = c.sections?.PRESENCE || '';
    const summary = c.userInput.slice(0, 60);
    return `<div class="history-card rarity-${lc}" onclick="viewCard(${c.timestamp})">
      ${c.material ? '<div class="h-material-tag">素材</div>' : ''}
      <div class="h-rarity" style="background:var(--${lc}-border);color:${lc === 'ur' ? '#1a0a2e' : '#fff'}">${c.level}</div>
      <div class="h-title">${presence.slice(0,30)}</div>
      <div class="h-preview">${summary}${c.userInput.length > 60 ? '...' : ''}</div>
    </div>`;
  }).join('');
}

function viewCard(timestamp) {
  const card = allCards.find(c => c.timestamp === timestamp);
  if (!card) return;
  currentCard = card;
  renderCard(card.sections, card.userInput);
  showView('result-view');
}

// ============================================================
//  MAIN FLOW
// ============================================================
async function startDecoupling() {
  const input = document.getElementById('main-input').value.trim();
  if (!input) return;

  const scene = document.getElementById('scene-input').value.trim();

  // 检查 API key
  if (!getApiKey()) {
    document.getElementById('api-key-input').focus();
    return;
  }

  document.getElementById('submit-btn').disabled = true;

  // 等待序列
  showView('waiting-view');
  const lines = document.querySelectorAll('.waiting-line');
  lines.forEach((line, i) => {
    setTimeout(() => {
      line.classList.add('visible');
      if (line.dataset.highlight === 'true') {
        line.classList.add('highlight');
      }
    }, parseInt(line.dataset.delay));
  });

  // 最后一条出现后停留
  const presenceDelay = 8500;

  try {
    const raw = await callDeepSeek(input, scene);
    const sections = parseOutput(raw);

    // 隐藏等待序列
    document.getElementById('waiting-sequence').style.display = 'none';

    // 渲染卡片
    renderCard(sections, input);
    showView('result-view');
  } catch(err) {
    alert(err.message || '请求失败');
    goHome();
  }
}

    viewCard(allCards[idx].timestamp);
  }
}
