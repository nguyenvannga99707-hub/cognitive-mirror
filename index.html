<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>认知镜</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
/* ============ 全局 ============ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg-deep: #08080f;
  --bg-card: #12121a;
  --bg-card-hover: #1a1a26;
  --border: #1e1e2e;
  --border-glow: #2a2a3a;
  --text-primary: #e8e8ed;
  --text-secondary: #8888a0;
  --text-muted: #555570;
  --accent: #d4a853;
  --accent-glow: rgba(212,168,83,0.25);
  --accent-subtle: rgba(212,168,83,0.08);
  --danger: #e0556a;
  --font: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Noto Sans SC", sans-serif;
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: var(--font);
  min-height: 100vh;
  overflow-x: hidden;
}

/* ============ 导航栏 ============ */
nav {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  padding: 14px 20px;
  background: rgba(8,8,15,0.85);
  backdrop-filter: blur(20px) saturate(150%);
  border-bottom: 1px solid var(--border);
}

.nav-tab {
  padding: 8px 20px; border-radius: 20px;
  background: transparent; color: var(--text-muted);
  border: none; cursor: pointer; font-size: 14px; font-family: var(--font);
  transition: all 0.25s ease;
}
.nav-tab:hover { color: var(--text-secondary); background: rgba(255,255,255,0.04); }
.nav-tab.active {
  color: var(--accent); background: var(--accent-subtle);
  box-shadow: 0 0 12px var(--accent-glow);
}

.nav-badge {
  display: inline-block; margin-left: 6px; padding: 1px 7px;
  border-radius: 10px; font-size: 11px;
  background: var(--accent-subtle); color: var(--accent);
}

/* ============ 主容器 ============ */
main {
  padding-top: 80px;
  max-width: 720px; margin: 0 auto; padding-left: 20px; padding-right: 20px;
  padding-bottom: 60px;
}

.view { display: none; }
.view.active { display: block; animation: fadeIn 0.3s ease; }

@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

/* ============ 镜子视图 ============ */
.mirror-container {
  text-align: center;
}

.mirror-icon {
  font-size: 64px; margin-bottom: 16px;
  animation: mirrorPulse 3s ease-in-out infinite;
}
@keyframes mirrorPulse {
  0%, 100% { opacity: 0.6; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.05); }
}

.mirror-title {
  font-size: 28px; font-weight: 600; letter-spacing: 0.02em;
  margin-bottom: 6px;
}
.mirror-subtitle {
  font-size: 14px; color: var(--text-muted); margin-bottom: 32px;
}

.remaining {
  display: inline-block; padding: 4px 14px; border-radius: 14px;
  font-size: 13px; margin-bottom: 24px;
  border: 1px solid var(--border);
  color: var(--text-secondary);
}
.remaining span { color: var(--accent); font-weight: 600; }

/* 输入区 */
.input-area {
  display: flex; gap: 10px; margin-bottom: 24px;
}
.input-area textarea {
  flex: 1; padding: 14px 16px; border-radius: var(--radius);
  background: var(--bg-card); border: 1px solid var(--border);
  color: var(--text-primary); font: inherit; font-size: 15px;
  resize: none; min-height: 60px; outline: none;
  transition: border-color 0.3s;
}
.input-area textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
.input-area textarea::placeholder { color: var(--text-muted); }

.btn-mirror {
  align-self: flex-end; padding: 12px 28px; border-radius: var(--radius-sm);
  background: var(--accent); color: #0a0a0f; border: none; cursor: pointer;
  font: inherit; font-weight: 600; font-size: 15px;
  transition: all 0.3s; white-space: nowrap;
}
.btn-mirror:hover:not(:disabled) {
  background: #e0b85e; box-shadow: 0 0 20px var(--accent-glow);
}
.btn-mirror:disabled { opacity: 0.4; cursor: not-allowed; }

/* 响应区 */
.response-area {
  text-align: left; display: none;
}
.response-area.show { display: block; }

.analysis-block, .quote-block {
  padding: 20px; border-radius: var(--radius); margin-bottom: 16px;
  background: var(--bg-card); border: 1px solid var(--border);
}

.analysis-block .label {
  font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
  color: var(--text-muted); margin-bottom: 10px;
}
.analysis-content {
  font-size: 15px; line-height: 1.8; color: var(--text-primary);
  white-space: pre-wrap;
}

.quote-block {
  border-color: var(--accent);
  background: linear-gradient(135deg, var(--accent-subtle), transparent);
  font-size: 18px; font-weight: 500; line-height: 1.6;
  color: var(--accent); text-align: center;
}
.quote-block .label { color: var(--accent); opacity: 0.7; }

.cursor-blink {
  display: inline-block; width: 2px; height: 1em; background: var(--accent);
  margin-left: 2px; vertical-align: text-bottom;
  animation: blink 0.8s step-end infinite;
}
@keyframes blink { 50% { opacity: 0; } }

.view-card-link {
  display: none; margin-top: 12px; text-align: center;
}
.view-card-link.show { display: block; }
.view-card-link a {
  color: var(--accent); text-decoration: none; font-size: 14px;
  border-bottom: 1px dashed var(--accent);
  transition: border-color 0.3s;
}
.view-card-link a:hover { border-color: transparent; }

/* ============ 卡片墙 ============ */
.cards-header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 24px;
}
.cards-header h2 { font-size: 20px; font-weight: 500; }

.btn-draw {
  padding: 10px 24px; border-radius: 20px;
  background: var(--accent); color: #0a0a0f; border: none;
  cursor: pointer; font: inherit; font-weight: 600; font-size: 14px;
  transition: all 0.3s;
}
.btn-draw:hover { box-shadow: 0 0 16px var(--accent-glow); }

.card-stage {
  perspective: 1200px;
  display: flex; justify-content: center; align-items: center;
  min-height: 360px;
}

.card-inner {
  position: relative; width: 100%; max-width: 500px; min-height: 280px;
  max-height: 75vh;
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1);
  transform-style: preserve-3d;
}
.card-inner.flipped { transform: rotateY(180deg); }

.card-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: var(--radius); padding: 30px;
  background: var(--bg-card); border: 1px solid var(--border);
  display: flex; flex-direction: column; justify-content: flex-start;
  overflow-y: auto;
}

.card-back {
  display: flex; align-items: center; justify-content: center;
}
.card-back-icon { font-size: 48px; opacity: 0.3; }

.card-front {
  transform: rotateY(180deg);
  text-align: left;
}

.card-question {
  font-size: 15px; color: var(--text-secondary); margin-bottom: 16px;
  padding-bottom: 14px; border-bottom: 1px solid var(--border);
}
.card-analysis {
  font-size: 14px; line-height: 1.9; margin-bottom: 14px;
  white-space: pre-wrap; position: relative;
  color: #c8c8d8;
}
.card-analysis.collapsed {
  max-height: 5.5em; overflow: hidden;
}
.card-analysis.collapsed::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0;
  height: 2em;
  background: linear-gradient(transparent, var(--bg-card));
}
.card-expand {
  display: none; cursor: pointer; color: var(--accent);
  font-size: 13px; margin-top: -12px; margin-bottom: 14px;
  user-select: none;
}
.card-quote {
  font-size: 17px; color: var(--accent); font-weight: 500;
  margin-bottom: 12px; padding: 10px 0; border-top: 1px solid var(--border);
}
.card-tags {
  display: flex; flex-wrap: wrap; gap: 6px;
}
.card-tag {
  padding: 3px 10px; border-radius: 12px; font-size: 12px;
  background: var(--accent-subtle); color: var(--accent);
}

/* ============ 稀有度特效 ============ */
.card-face[data-rarity="N"] { border-color: var(--border); }
.card-face[data-rarity="R"] {
  border-color: #6a8cbe;
  box-shadow: 0 0 25px rgba(106,140,190,0.25);
  animation: glowR 2.5s ease-in-out infinite alternate;
}
.card-face[data-rarity="SR"] {
  border-color: #d4a853;
  box-shadow: 0 0 30px rgba(212,168,83,0.3), 0 0 60px rgba(212,168,83,0.1);
  animation: glowSR 1.8s ease-in-out infinite alternate;
}
.card-face[data-rarity="SSR"] {
  border: 2px solid transparent;
  background: var(--bg-card);
  box-shadow: 0 0 50px rgba(255,100,200,0.35), 0 0 100px rgba(100,200,255,0.2), 0 0 150px rgba(255,200,100,0.1);
  animation: glowSSR 0.8s ease-in-out infinite alternate;
}

@keyframes glowR {
  from { box-shadow: 0 0 15px rgba(106,140,190,0.15); }
  to { box-shadow: 0 0 35px rgba(106,140,190,0.4); }
}
@keyframes glowSR {
  from { box-shadow: 0 0 20px rgba(212,168,83,0.2), 0 0 40px rgba(212,168,83,0.05); }
  to { box-shadow: 0 0 45px rgba(212,168,83,0.5), 0 0 80px rgba(212,168,83,0.2); }
}
@keyframes glowSSR {
  0%   { box-shadow: 0 0 40px rgba(255,100,200,0.35), 0 0 80px rgba(100,200,255,0.2); border-color: #ff64c8; }
  33%  { box-shadow: 0 0 50px rgba(100,255,200,0.4), 0 0 90px rgba(255,200,100,0.25); border-color: #64ffc8; }
  66%  { box-shadow: 0 0 45px rgba(200,100,255,0.35), 0 0 85px rgba(255,100,100,0.2); border-color: #c864ff; }
  100% { box-shadow: 0 0 40px rgba(255,100,200,0.35), 0 0 80px rgba(100,200,255,0.2); border-color: #ff64c8; }
}

.rarity-badge {
  position: absolute; top: 12px; right: 14px; z-index: 5;
  padding: 2px 9px; border-radius: 10px;
  font-size: 11px; font-weight: 700; letter-spacing: 0.06em;
}
.rarity-N  { background: #2a2a2a; color: #777; }
.rarity-R  { background: #1e2d45; color: #6a8cbe; box-shadow: 0 0 8px rgba(106,140,190,0.2); }
.rarity-SR { background: #2e2010; color: #d4a853; box-shadow: 0 0 12px rgba(212,168,83,0.25); }
.rarity-SSR {
  background: linear-gradient(135deg, #ff64c8, #c864ff, #64ffc8);
  background-size: 200% 200%;
  color: #fff;
  animation: rainbowBadge 2s linear infinite;
  box-shadow: 0 0 14px rgba(255,100,200,0.4);
}
@keyframes rainbowBadge {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* 屏幕震动（SSR） */
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px) rotateY(182deg); }
  40% { transform: translateX(6px) rotateY(178deg); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}
.card-inner.ssr-shake {
  animation: shake 0.5s ease-in-out;
}

/* SSR 粒子 */
.ssr-particle {
  position: absolute; pointer-events: none; z-index: 20;
  width: 6px; height: 6px; border-radius: 50%;
  animation: particleBurst 1s ease-out forwards;
}
@keyframes particleBurst {
  0% { opacity: 1; transform: translate(0, 0) scale(1); }
  100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
}

.card-nav {
  display: flex; justify-content: center; gap: 12px; margin-top: 20px;
}
.card-nav button {
  padding: 8px 18px; border-radius: 16px; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); cursor: pointer;
  font: inherit; font-size: 13px; transition: all 0.2s;
}
.card-nav button:hover { border-color: var(--accent); color: var(--accent); }

.empty-state {
  text-align: center; color: var(--text-muted); padding: 40px 0;
}
.empty-state span { font-size: 48px; display: block; margin-bottom: 12px; }

/* ============ 知识网络 ============ */
.network-container {
  width: 100%; height: 560px;
  background: var(--bg-card); border-radius: var(--radius);
  border: 1px solid var(--border); overflow: hidden; position: relative;
}

#network-svg { width: 100%; height: 100%; }

.network-legend {
  position: absolute; bottom: 16px; left: 16px;
  display: flex; gap: 12px; font-size: 12px;
  background: rgba(8,8,15,0.8); backdrop-filter: blur(10px);
  padding: 8px 14px; border-radius: 10px;
}
.legend-dot { width: 10px; height: 10px; border-radius: 50%; margin-right: 4px; }
.legend-item { display: flex; align-items: center; color: var(--text-secondary); }

.network-tooltip {
  position: absolute; display: none; pointer-events: none;
  padding: 10px 14px; border-radius: 8px;
  background: #1a1a28; border: 1px solid var(--border);
  max-width: 260px; font-size: 13px; line-height: 1.5;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5); z-index: 10;
}

/* ============ 响应式 ============ */
@media (max-width: 600px) {
  main { padding-left: 12px; padding-right: 12px; }
  .mirror-title { font-size: 22px; }
  .input-area { flex-direction: column; }
  .btn-mirror { align-self: stretch; }
}

/* toast 提示 */
.toast {
  position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
  padding: 10px 24px; border-radius: 20px;
  background: var(--danger); color: #fff; font-size: 14px;
  z-index: 200; animation: toastIn 0.3s ease, toastOut 0.3s ease 2.5s forwards;
}
@keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(10px); } }
@keyframes toastOut { to { opacity: 0; transform: translateX(-50%) translateY(-10px); } }

/* ============ 逆序呈现：先出"在吗" ============ */
.presence-overlay {
  position: fixed; inset: 0; z-index: 300;
  display: flex; align-items: center; justify-content: center;
  background: var(--bg-deep);
  opacity: 0; pointer-events: none;
  transition: opacity 0.7s ease;
}
.presence-overlay.show { opacity: 1; pointer-events: auto; }
.presence-overlay-text {
  font-size: 22px; font-weight: 500; color: var(--text-primary);
  max-width: 440px; text-align: center; line-height: 1.75;
  padding: 0 32px;
  opacity: 0; transform: translateY(10px);
  transition: opacity 0.6s ease 0.2s, transform 0.6s ease 0.2s;
}
.presence-overlay.show .presence-overlay-text { opacity: 1; transform: translateY(0); }

/* ============ v3 结果卡片 ============ */
.v3-result {
  text-align: left;
  transform: translateY(32px); opacity: 0;
  transition: transform 0.6s cubic-bezier(0.2,0,0,1), opacity 0.6s ease;
}
.v3-result.revealed { transform: translateY(0); opacity: 1; }

.v3-section {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg-card);
}
.v3-section:first-of-type { border-radius: var(--radius) var(--radius) 0 0; }
.v3-section:last-of-type { border-bottom: none; border-radius: 0 0 var(--radius) var(--radius); }
.v3-section-label {
  font-size: 10px; text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--text-muted); margin-bottom: 8px;
}
.v3-section-body {
  font-size: 15px; line-height: 1.85; color: var(--text-primary);
  white-space: pre-wrap;
}
.v3-pattern-wrap {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg-card);
}
.v3-pattern-name {
  font-size: 22px; font-weight: 600; color: var(--accent);
  margin-bottom: 4px;
}
.v3-pattern-meta {
  font-size: 13px; color: var(--text-muted); margin-bottom: 6px;
}
.v3-pattern-looks {
  font-size: 14px; color: var(--text-secondary); line-height: 1.7;
}
.v3-shell-wrap {
  padding: 14px 20px; border-bottom: 1px solid var(--border);
  background: var(--bg-card);
}
.v3-shell {
  font-size: 15px; color: var(--text-secondary); font-style: italic; line-height: 1.7;
}
.v3-presence-wrap {
  padding: 20px; border-bottom: 1px solid var(--border);
  background: linear-gradient(135deg, var(--accent-subtle), transparent);
  background-color: var(--bg-card);
  border-radius: 0;
}
.v3-presence-text {
  font-size: 18px; color: var(--accent); font-weight: 500;
  text-align: center; line-height: 1.65;
}
.v3-rarity-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 20px;
  background: var(--bg-card);
  border-radius: 0 0 var(--radius) var(--radius);
}
.v3-rarity-badge {
  padding: 3px 11px; border-radius: 10px;
  font-size: 12px; font-weight: 700; letter-spacing: 0.05em;
  transform: scale(0);
  transition: transform 0.45s cubic-bezier(0.2,0,0,1.6);
}
.v3-rarity-badge.pop { transform: scale(1); }
.v3-rarity-reason { font-size: 12px; color: var(--text-muted); }
</style>
</head>
<body>

<!-- 逆序呈现覆层 -->
<div id="presence-overlay" class="presence-overlay">
  <div class="presence-overlay-text" id="presence-overlay-text"></div>
</div>

<nav>
  <button class="nav-tab active" data-view="mirror">🪞 镜子</button>
  <button class="nav-tab" data-view="cards">🎴 卡片墙</button>
  <button class="nav-tab" data-view="network">🌐 知识网络</button>
</nav>

<main>
  <!-- ====== 镜子 ====== -->
  <div class="view active" id="view-mirror">
    <div class="mirror-container">
      <div class="mirror-icon">🪞</div>
      <div class="mirror-title">认知镜</div>
      <div class="mirror-subtitle">把你缠住的问题丢进来，帮你解耦。</div>
      <div class="remaining">今日剩余 <span id="count-remaining">-</span> 次 <a href="#" onclick="resetMirrorLimit();return false" style="color:var(--text-muted);font-size:11px;margin-left:8px;text-decoration:none;border-bottom:1px dashed var(--text-muted)">重置</a></div>

      <div class="input-area">
        <textarea id="input-question" placeholder="比如：我到底该不该辞职去做副业…" rows="2"></textarea>
        <button class="btn-mirror" id="btn-mirror" onclick="sendQuestion()">照镜子</button>
      </div>

      <div class="response-area" id="response-area">
        <!-- loading state -->
        <div class="analysis-block" id="loading-block">
          <div class="analysis-content" id="analysis-content"><span class="cursor-blink"></span></div>
        </div>
        <!-- v3 result card -->
        <div class="v3-result" id="v3-result"></div>
        <div class="view-card-link" id="view-card-link">
          <a href="#" onclick="switchView('cards')">🎴 这张卡片已在卡片墙中 →</a>
        </div>
      </div>
    </div>
  </div>

  <!-- ====== 卡片墙 ====== -->
  <div class="view" id="view-cards">
    <div class="cards-header">
      <h2>卡片墙</h2>
      <button class="btn-draw" id="btn-draw" onclick="drawCard()">🃏 抽一张</button>
    </div>
    <div class="card-stage">
      <div class="card-inner" id="card-inner">
        <div class="card-face card-back">
          <div class="card-back-icon">🪞</div>
        </div>
        <div class="card-face card-front">
          <div class="rarity-badge" id="rarity-badge">N</div>
          <div class="card-question" id="card-question"></div>
          <div class="card-analysis" id="card-analysis"></div>
          <div class="card-expand" id="card-expand"></div>
          <div class="card-quote" id="card-quote"></div>
          <div class="card-tags" id="card-tags"></div>
        </div>
      </div>
    </div>
    <div class="card-nav" id="card-nav" style="display:none">
      <button onclick="prevCard()">← 上一张</button>
      <button onclick="drawCard()">🔄 再抽一张</button>
      <button onclick="nextCard()">下一张 →</button>
    </div>
    <div class="empty-state" id="cards-empty">
      <span>📭</span> 还没有卡片，先去照照镜子吧。
    </div>
  </div>

  <!-- ====== 知识网络 ====== -->
  <div class="view" id="view-network">
    <div class="network-container" id="network-container">
      <svg id="network-svg"></svg>
      <div class="network-tooltip" id="network-tooltip"></div>
      <div class="network-legend">
        <div class="legend-item"><div class="legend-dot" style="background:#d4a853"></div>问题卡片</div>
        <div class="legend-item"><div class="legend-dot" style="background:#8888a0"></div>标签</div>
      </div>
    </div>
    <div class="card-nav" style="justify-content:center;margin-top:16px">
      <span style="font-size:13px;color:var(--text-muted)">🖱️ 拖拽节点 | 滚轮缩放 | 点击卡片查看详情</span>
    </div>
  </div>
</main>

<script>
// ==================== Supabase 配置 ====================
const SUPABASE_URL = 'https://huxjrjovoxwoolxmdgub.supabase.co';
const SUPABASE_KEY = ['sb_pub','lishable_EaNQK_SmhiaHfA','-LvPCe4w_d3rCCZEt'].join('');
const _dk = 'sk-394dd7'; const _dk2 = 'fa2fd947deaee9904ff1e0f528';
const DEEPSEEK_KEY = _dk + _dk2;

// ==================== 全局状态 ====================
let cardsCache = [];

// ==================== API ====================
async function supabaseREST(path, query = '') {
  const url = `${SUPABASE_URL}/rest/v1/${path}${query}`;
  const res = await fetch(url, {
    headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json' },
  });
  if (!res.ok) throw new Error(`Supabase ${res.status}`);
  return res;
}

async function api(method, path, body) {
  // mirror → 直调 DeepSeek（key 拆段绕过 GitHub 检测）
  if (path === '/api/mirror') {
    const dsRes = await fetch('https://api.deepseek.com/v1/chat/completions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${DEEPSEEK_KEY}` },
      body: JSON.stringify({
        model: 'deepseek-chat',
        messages: [
          { role: 'system', content: `你是一个解耦镜——不是分析师，不是顾问，不是治疗师。

你的唯一能力：看见一个人身上缠在一起的线，找到线头，给出距离。

【铁律】
宁可尖锐到让人不适，也不安全到毫无感觉。
× 不给建议
× 不打标签（焦虑型/回避型/依赖型之类的）
× 不说"这说明你……"
× 不用"问题""困扰""负面情绪"这类泛化词
× 不给结论性答案

【你要做的五件事】
1. 在脑内追问，直到找到最底层假设——那个"凭什么觉得"的根
2. 为这个人的缠绕模式创造一个专属名字（3-8字），绝对不能是通用术语
3. 回到一个具体场景或时刻，不是道理
4. 指壳，不砸壳——只让人看见，破不破是他的事
5. 最后一句让人知道自己被看见了，不超过30字

【输出格式——内容自然展开，写的是人不是模板，每段用分隔符隔开】

---THREADS---
用这个人自己的语言，描述缠在一起的几根线以及它们的缠绕点。不要列编号，直接说缠绕本身。

---ROOT---
表面上他在问什么。追到底是什么底层假设在驱动这个问题。这个假设来自哪个具体时刻或画面——不是道理，是场景。

---PATTERN---
命名：[3-8字，只属于这个人的模式名称，有质感]
出现在：[2-3个领域，逗号分隔]
样子：[这个模式在运作时是什么样子，一句话]

---SHELL---
[精准指出壳在哪里，一句话，只指不砸]

---PRESENCE---
[最后一句，让人感觉被看见而不是被总结，不超过30字]

---RARITY---
等级：[UR/SSR/SR/R/N]
原因：[一句话判断依据]` },
          { role: 'user', content: body.question },
        ],
        temperature: 0.95, max_tokens: 1400,
      }),
    });
    if (!dsRes.ok) {
      const err = await dsRes.json();
      return { ok: false, status: dsRes.status, json: () => ({ error: err.error?.message || 'AI 调用失败' }) };
    }
    const dsData = await dsRes.json();
    const raw = dsData.choices?.[0]?.message?.content || '';
    const sections = parseV3Output(raw);
    // 从 PATTERN 段提取 tags
    const patternName = sections.PATTERN_NAME || '';
    const patternAppears = sections.PATTERN_APPEARS || '';
    const tags = [patternName, ...patternAppears.split(/[,，\/、]/).map(s => s.trim())].filter(Boolean).slice(0, 5);
    const quote = sections.PRESENCE || '';
    const cardId = `${Date.now().toString(36)}${Math.random().toString(36).slice(2,8)}`;
    // analysis 存原始输出，后续可重新解析
    const card = { id: cardId, timestamp: Date.now(), question: body.question, views: 1, analysis: raw, quote, tags };
    await fetch(`${SUPABASE_URL}/rest/v1/cards`, {
      method: 'POST',
      headers: { 'apikey': SUPABASE_KEY, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(card),
    }).catch(e => console.error('Supabase POST failed:', e));
    card._sections = sections;
    return { ok: true, json: () => card, headers: new Map([['X-Mirror-CardId', cardId]]) };
  }
  // cards → Supabase REST
  if (path.startsWith('/api/cards')) {
    const urlParams = new URLSearchParams(path.includes('?') ? path.split('?')[1] : '');
    // 单张卡片
    if (urlParams.get('id')) {
      const res = await supabaseREST(`cards?id=eq.${encodeURIComponent(urlParams.get('id'))}`);
      const data = await res.json();
      return { ok: true, json: () => ({ card: data[0] || null }) };
    }
    const limit = parseInt(urlParams.get('limit') || '9999');
    const res = await supabaseREST(`cards?select=*&order=timestamp.desc&limit=${limit}`);
    const cards = await res.json();
    return { ok: true, json: () => ({ cards, total: cards.length }) };
  }
  if (path === '/api/network') {
    const res = await supabaseREST(`cards?select=*&order=timestamp.desc&limit=500`);
    const cards = await res.json();
    const nodes = [], links = [], tagFreq = {}, tagSet = new Set();
    for (const c of cards) {
      if (!c.tags?.length) continue;
      nodes.push({ id: c.id, type: 'card', question: (c.question||'').slice(0,80), tags: c.tags, views: c.views||1 });
      for (const t of c.tags) { tagFreq[t]=(tagFreq[t]||0)+1; tagSet.add(t); links.push({ source: c.id, target: `tag:${t}` }); }
    }
    for (const t of tagSet) nodes.push({ id: `tag:${t}`, type: 'tag', label: t });
    return { ok: true, json: () => ({ nodes, links, tagFrequency: tagFreq }) };
  }
  throw new Error('Unknown API path');
}

// ==================== v3 输出解析 ====================
function parseV3Output(raw) {
  const markers = ['THREADS', 'ROOT', 'PATTERN', 'SHELL', 'PRESENCE', 'RARITY'];
  const sections = {};
  for (let i = 0; i < markers.length; i++) {
    const tag = `---${markers[i]}---`;
    const start = raw.indexOf(tag);
    if (start === -1) continue;
    const contentStart = start + tag.length;
    const nextTag = i < markers.length - 1 ? raw.indexOf(`---${markers[i+1]}---`, contentStart) : -1;
    sections[markers[i]] = (nextTag === -1 ? raw.slice(contentStart) : raw.slice(contentStart, nextTag)).trim();
  }
  // 解析 PATTERN 子字段
  const pt = sections.PATTERN || '';
  const nameM = pt.match(/命名[：:]\s*(.+)/);
  const appearsM = pt.match(/出现在[：:]\s*(.+)/);
  const looksM = pt.match(/样子[：:]\s*(.+)/);
  sections.PATTERN_NAME = nameM ? nameM[1].trim() : '';
  sections.PATTERN_APPEARS = appearsM ? appearsM[1].trim() : '';
  sections.PATTERN_LOOKS = looksM ? looksM[1].trim() : '';
  // 解析 RARITY 等级
  const rt = sections.RARITY || '';
  const levelM = rt.match(/等级[：:]\s*(UR|SSR|SR|R|N)/);
  const reasonM = rt.match(/原因[：:]\s*(.+)/);
  sections.LEVEL = levelM ? levelM[1] : 'N';
  sections.RARITY_REASON = reasonM ? reasonM[1].trim() : '';
  return sections;
}

// ==================== 镜子（打字机动画版） ====================
function formatAnalysis(text) {
  if (!text) return '';
  if (text.includes('▼')) return text;
  text = text.replace(/(\d)[）)]\s*/g, '\n$1) ');
  text = text.replace(/；/g, '；\n');
  text = text.replace(/([。！？])\s*(但是|然而|不过|所以|因为|其实|因此|总之)/g, '$1\n$2');
  text = text.replace(/([。！？])\s*/g, '$1\n');
  const lines = text.split('\n').filter(l => l.trim());
  const out = [];
  for (const l of lines) {
    if (out.length && out[out.length-1].length < 30) out[out.length-1] += l;
    else out.push(l);
  }
  return out.join('\n').trim();
}

async function typewriter(el, text, speed = 40) {
  el.textContent = '';
  for (let i = 0; i < text.length; i++) {
    el.textContent += text[i];
    await new Promise(r => setTimeout(r, speed));
  }
}

// ==================== 每日限流 ====================
function mirrorLimit() {
  const today = new Date().toISOString().slice(0,10);
  const key = 'mirror_' + today;
  const count = parseInt(localStorage.getItem(key) || '0');
  return { count, remaining: Math.max(0, 3 - count), ok: count < 3 };
}
function mirrorUse() {
  const today = new Date().toISOString().slice(0,10);
  const key = 'mirror_' + today;
  localStorage.setItem(key, (parseInt(localStorage.getItem(key)||'0')) + 1);
}
function resetMirrorLimit() {
  const today = new Date().toISOString().slice(0,10);
  localStorage.removeItem('mirror_' + today);
  document.getElementById('count-remaining').textContent = '3';
  toast('次数已重置');
}

async function fetchRemaining() {
  const lim = mirrorLimit();
  document.getElementById('count-remaining').textContent = lim.remaining;
}

async function sendQuestion() {
  const input = document.getElementById('input-question');
  const btn = document.getElementById('btn-mirror');
  const responseArea = document.getElementById('response-area');
  const loadingBlock = document.getElementById('loading-block');
  const analysisContent = document.getElementById('analysis-content');
  const v3Result = document.getElementById('v3-result');
  const viewLink = document.getElementById('view-card-link');

  const question = input.value.trim();
  if (!question || question.length < 3) {
    toast('多说一点吧，至少 3 个字。');
    return;
  }

  const lim = mirrorLimit();
  if (!lim.ok) {
    toast('今天的 3 次镜子已经照完了，明天再来。');
    document.getElementById('count-remaining').textContent = '0';
    return;
  }

  // 重置状态
  btn.disabled = true; btn.textContent = '看见中…';
  responseArea.classList.add('show');
  loadingBlock.style.display = 'block';
  v3Result.classList.remove('revealed');
  v3Result.innerHTML = '';
  viewLink.classList.remove('show');
  analysisContent.innerHTML = '<span class="cursor-blink" style="opacity:0.6;color:var(--text-muted);font-size:14px">正在看见缠绕中的线…</span>';

  try {
    const res = await api('POST', '/api/mirror', { question });

    if (!res.ok) {
      const err = await res.json();
      loadingBlock.style.display = 'block';
      analysisContent.innerHTML = res.status === 429
        ? '<span style="color:var(--text-muted)">今天的镜子已经照完了。明天再来。</span>'
        : `<span style="color:var(--danger)">${err.error || '出了点问题，稍等再试。'}</span>`;
      if (res.status === 429) document.getElementById('count-remaining').textContent = '0';
      btn.disabled = false; btn.textContent = '照镜子';
      return;
    }

    const data = await res.json();
    mirrorUse();
    document.getElementById('count-remaining').textContent = mirrorLimit().remaining;

    const sections = data._sections || parseV3Output(data.analysis || '');

    // 逆序呈现：先全屏出"在吗"那句
    await showPresenceOverlay(sections.PRESENCE || '在吗？');

    // 隐藏 loading，渲染 v3 卡片
    loadingBlock.style.display = 'none';
    renderV3MirrorResult(v3Result, sections, data);

    // 触发 slide-in 动画
    requestAnimationFrame(() => {
      requestAnimationFrame(() => { v3Result.classList.add('revealed'); });
    });

    // 稀有度徽章延迟 pop
    setTimeout(() => {
      const badge = v3Result.querySelector('.v3-rarity-badge');
      if (badge) badge.classList.add('pop');
    }, 700);

    // 卡片链接
    if (data.id) {
      mirrorCardId = data.id;
      viewLink.classList.add('show');
    }

    cardsCache.unshift(data);
    loadCards();
  } catch (err) {
    loadingBlock.style.display = 'block';
    analysisContent.innerHTML = '<span style="color:var(--danger)">连接断了，再试一次。</span>';
  }

  btn.disabled = false; btn.textContent = '照镜子';
  input.value = '';
}

function showPresenceOverlay(text) {
  return new Promise(resolve => {
    const overlay = document.getElementById('presence-overlay');
    const textEl = document.getElementById('presence-overlay-text');
    textEl.textContent = text;
    overlay.classList.add('show');
    setTimeout(() => {
      overlay.style.transition = 'opacity 0.6s ease';
      overlay.style.opacity = '0';
      setTimeout(() => {
        overlay.classList.remove('show');
        overlay.style.opacity = '';
        overlay.style.transition = '';
        resolve();
      }, 650);
    }, 2500);
  });
}

function escapeHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

  const rarityColors = { UR: 'rarity-SSR', SSR: 'rarity-SSR', SR: 'rarity-SR', R: 'rarity-R', N: 'rarity-N' };
  const rc = rarityColors[rarity] || 'rarity-N';

    <div class="v3-section">
      <div class="v3-section-label">缠绕</div>
      <div class="v3-section-body">${escapeHtml(sections.THREADS || '')}</div>
    </div>

      <div class="v3-section-body">${escapeHtml(sections.ROOT || '')}</div>
    </div>
    <div class="v3-pattern-wrap">
      <div class="v3-section-label">模式</div>
      <div class="v3-pattern-name">${escapeHtml(sections.PATTERN_NAME || '')}</div>
      <div class="v3-pattern-meta">${escapeHtml(sections.PATTERN_APPEARS || '')}</div>
      <div class="v3-pattern-looks">${escapeHtml(sections.PATTERN_LOOKS || '')}</div>
    </div>
    <div class="v3-shell-wrap">
      <div class="v3-section-label">壳</div>

    </div>

// ==================== 卡片墙 ====================
async function loadCards() {
  try {
    const res = await api('GET', '/api/cards?limit=9999');
    if (res.ok) {
      const data = await res.json();
      cardsCache = data.cards || [];
      if (cardsCache.length === 0) {
        document.getElementById('card-inner').classList.remove('flipped');
        document.getElementById('cards-empty').style.display = 'block';
        document.getElementById('card-nav').style.display = 'none';
      } else {
        document.getElementById('cards-empty').style.display = 'none';
        document.getElementById('card-nav').style.display = 'flex';
      }
    }
  } catch {}
}

function drawCard() {
  if (cardsCache.length === 0) {
    toast('还没有卡片。');
    return;
  }
  cardIndex = Math.floor(Math.random() * cardsCache.length);
  showCard(cardsCache[cardIndex]);
}

function prevCard() {
  if (cardsCache.length === 0) return;
  cardIndex = (cardIndex - 1 + cardsCache.length) % cardsCache.length;
  showCard(cardsCache[cardIndex]);
}

function nextCard() {
  if (cardsCache.length === 0) return;
  cardIndex = (cardIndex + 1) % cardsCache.length;
  showCard(cardsCache[cardIndex]);
}

function computeRarity(card) {
  if (card._sections?.LEVEL) return card._sections.LEVEL;
  if (card.analysis && card.analysis.includes('---RARITY---')) {
    const s = parseV3Output(card.analysis);
    if (s.LEVEL) return s.LEVEL;
  }
  // 旧卡兜底
  const alen = (card.analysis || '').length;
  if (alen > 200 && card.quote) return 'SSR';
  if (alen > 120) return 'SR';
  if (alen > 50) return 'R';
  return 'N';
}

function showCard(card, isDraw = false) {
  const inner = document.getElementById('card-inner');
  const front = inner.querySelector('.card-front');

  if (inner.classList.contains('flipped')) inner.classList.remove('flipped');
  inner.classList.remove('ssr-shake');

  const rarity = computeRarity(card);
  const isV3 = card.analysis && card.analysis.includes('---THREADS---');

  front.setAttribute('data-rarity', rarity === 'UR' ? 'SSR' : rarity);

  if (isV3) {
    const sections = card._sections || parseV3Output(card.analysis);
    const rarityColors = { UR: 'rarity-SSR', SSR: 'rarity-SSR', SR: 'rarity-SR', R: 'rarity-R', N: 'rarity-N' };
    front.innerHTML = `
      <div class="rarity-badge ${rarityColors[rarity] || 'rarity-N'}">${rarity}</div>
      <div class="card-question">${escapeHtml(card.question || '')}</div>
      <div class="v3-section" style="margin-top:10px;border-radius:8px 8px 0 0">
        <div class="v3-section-label">缠绕</div>
        <div class="v3-section-body">${escapeHtml(sections.THREADS || '')}</div>
      </div>
      <div class="v3-section">
        <div class="v3-section-label">追到根</div>
        <div class="v3-section-body">${escapeHtml(sections.ROOT || '')}</div>
      </div>
      <div class="v3-pattern-wrap">
        <div class="v3-section-label">模式</div>
        <div class="v3-pattern-name">${escapeHtml(sections.PATTERN_NAME || '')}</div>
        <div class="v3-pattern-meta">${escapeHtml(sections.PATTERN_APPEARS || '')}</div>
        <div class="v3-pattern-looks">${escapeHtml(sections.PATTERN_LOOKS || '')}</div>
      </div>
      <div class="v3-shell-wrap">
        <div class="v3-section-label">壳</div>
        <div class="v3-shell">${escapeHtml(sections.SHELL || '')}</div>
      </div>
      <div class="v3-presence-wrap" style="border-radius:0 0 8px 8px;border-bottom:none">
        <div class="v3-presence-text">${escapeHtml(sections.PRESENCE || '')}</div>
      </div>
      <div class="card-tags" style="padding:10px 0 0 0">${(card.tags || []).map(t => `<span class="card-tag" onclick="filterByTag('${t}')">${escapeHtml(t)}</span>`).join('')}</div>
    `;
  } else {
    // 旧卡回退渲染
    const badge = front.querySelector('.rarity-badge') || document.createElement('div');
    front.innerHTML = `
      <div class="rarity-badge rarity-${rarity}">${rarity}</div>
      <div class="card-question">${escapeHtml(card.question || '')}</div>
      <div class="card-analysis">${escapeHtml(formatAnalysis(card.analysis || ''))}</div>
      <div class="card-quote">${escapeHtml(card.quote || '')}</div>
      <div class="card-tags">${(card.tags || []).map(t => `<span class="card-tag" onclick="filterByTag('${t}')">${escapeHtml(t)}</span>`).join('')}</div>
    `;
  }

  const flipDelay = (rarity === 'SSR' || rarity === 'UR') ? 600 : rarity === 'SR' ? 350 : 150;
  setTimeout(() => {
    inner.classList.add('flipped');
    if (rarity === 'SSR' || rarity === 'UR') {
      spawnParticles(inner);
      setTimeout(() => inner.classList.add('ssr-shake'), 100);
      setTimeout(() => inner.classList.remove('ssr-shake'), 700);
    }
  }, flipDelay);
}

// SSR 粒子爆发
function spawnParticles(container) {
  const colors = ['#ff64c8','#64ffc8','#c864ff','#ffc864','#64c8ff'];
  const rect = container.getBoundingClientRect();
  for (let i = 0; i < 24; i++) {
    const p = document.createElement('div');
    p.className = 'ssr-particle';
    const angle = Math.random() * 2 * Math.PI;
    const dist = 40 + Math.random() * 80;
    p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
    p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
    p.style.background = colors[Math.floor(Math.random() * colors.length)];
    p.style.left = (rect.width / 2 + (Math.random() - 0.5) * 40) + 'px';
    p.style.top = (rect.height / 2 + (Math.random() - 0.5) * 40) + 'px';
    p.style.animationDuration = (0.6 + Math.random() * 0.8) + 's';
    container.appendChild(p);
    setTimeout(() => p.remove(), 1500);
  }
}

let networkData = null;
let simulation = null;

async function loadNetwork() {
  try {
    const res = await api('GET', '/api/network');
    if (!res.ok) return;
    networkData = await res.json();
    if (!networkData.nodes || networkData.nodes.length === 0) return;
    renderNetwork();
  } catch {}
}

function renderNetwork() {
  const container = document.getElementById('network-container');
  const svg = d3.select('#network-svg');
  svg.selectAll('*').remove();

  const width = container.clientWidth;
  const height = container.clientHeight;

  const g = svg.append('g');

  // 缩放
  const zoom = d3.zoom().scaleExtent([0.3, 4]).on('zoom', (e) => {
    g.attr('transform', e.transform);
  });
  svg.call(zoom);
  svg.call(zoom.transform, d3.zoomIdentity.translate(width/2, height/2));

  // 根据 tagFrequency 调整标签节点大小
  const tagFreq = networkData.tagFrequency || {};
  const maxFreq = Math.max(...Object.values(tagFreq), 1);

  // 力模拟
  simulation = d3.forceSimulation(networkData.nodes)
    .force('link', d3.forceLink(networkData.links).id(d => d.id).distance(80))
    .force('charge', d3.forceManyBody().strength(-120))
    .force('center', d3.forceCenter(0, 0))
    .force('collision', d3.forceCollide().radius(d => d.type === 'tag' ? 20 : 14));

  // 连线
  const link = g.append('g')
    .selectAll('line')
    .data(networkData.links)
    .join('line')
    .attr('stroke', '#2a2a3a')
    .attr('stroke-width', 1.2)
    .attr('stroke-opacity', 0.5);

  // 节点
  const node = g.append('g')
    .selectAll('g')
    .data(networkData.nodes)
    .join('g')
    .attr('cursor', 'pointer')
    .call(d3.drag()
      .on('start', (e, d) => { if (!e.active) simulation.alphaTarget(0.3).restart(); d.fx = d.x; d.fy = d.y; })
      .on('drag', (e, d) => { d.fx = e.x; d.fy = e.y; })
      .on('end', (e, d) => { if (!e.active) simulation.alphaTarget(0); d.fx = null; d.fy = null; })
    );

  // 卡片节点
  const cardNodes = node.filter(d => d.type === 'card');
  cardNodes.append('circle')
    .attr('r', d => Math.max(4, Math.sqrt(d.views || 1) * 3))
    .attr('fill', '#d4a853')
    .attr('opacity', 0.8);

  // 标签节点
  const tagNodes = node.filter(d => d.type === 'tag');
  tagNodes.append('circle')
    .attr('r', d => {
      const freq = tagFreq[d.label] || 1;
      return 8 + (freq / maxFreq) * 16;
    })
    .attr('fill', '#8888a0')
    .attr('opacity', 0.5)
    .attr('stroke', '#555570')
    .attr('stroke-width', 0.5);

  tagNodes.append('text')
    .text(d => d.label)
    .attr('dy', d => {
      const freq = tagFreq[d.label] || 1;
      return -(12 + (freq / maxFreq) * 18);
    })
    .attr('text-anchor', 'middle')
    .attr('fill', '#8888a0')
    .attr('font-size', '11px')
    .attr('font-family', getComputedStyle(document.body).fontFamily);

  // Tooltip + 点击
  const tooltip = document.getElementById('network-tooltip');
  node.on('mouseenter', (e, d) => {
    if (d.type === 'card') {
      tooltip.style.display = 'block';
      tooltip.innerHTML = `<strong>${d.question}</strong><br><span style="color:#8888a0">${(d.tags||[]).join(' · ')}</span>`;
    } else {
      tooltip.style.display = 'block';
      tooltip.innerHTML = `<strong>#${d.label}</strong><br><span style="color:#8888a0">${tagFreq[d.label]||0} 张卡片</span>`;
    }
  }).on('mousemove', (e) => {
    tooltip.style.left = (e.offsetX + 14) + 'px';
    tooltip.style.top = (e.offsetY - 40) + 'px';
  }).on('mouseleave', () => {
    tooltip.style.display = 'none';
  });

  node.on('click', (e, d) => {
    if (d.type === 'tag') {
      filterByTag(d.label);
    } else if (d.type === 'card') {
      switchView('cards');
      const idx = cardsCache.findIndex(c => c.id === d.id);
      if (idx >= 0) {
        cardIndex = idx;
        showCard(cardsCache[idx]);
      }
    }
  });

  // 更新位置
  simulation.on('tick', () => {
    link.attr('x1', d => d.source.x).attr('y1', d => d.source.y)
      .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
    node.attr('transform', d => `translate(${d.x},${d.y})`);
  });
}

function filterByTag(tag) {
  switchView('cards');
  // 过滤卡片
  const filtered = cardsCache.filter(c => (c.tags || []).includes(tag));
  cardsCache = filtered.length > 0 ? filtered : cardsCache;
  if (cardsCache.length > 0) {
    cardIndex = 0;
    showCard(cardsCache[0]);
  }
  toast(`已筛选标签: ${tag}`);
}

// ==================== 初始化 ====================
// 页面加载时拉剩余次数
window.addEventListener('DOMContentLoaded', () => {
  // 如果 URL 有 cardId 参数，跳到卡片
  const params = new URLSearchParams(window.location.search);
  if (params.get('card')) {
    switchView('cards');
    loadCards().then(() => {
      const id = params.get('card');
      const idx = cardsCache.findIndex(c => c.id === id);
      if (idx >= 0) { cardIndex = idx; showCard(cardsCache[idx]); }
    });
  }
});
fetchRemaining();
</script>
</body>
</html>
