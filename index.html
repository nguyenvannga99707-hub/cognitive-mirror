<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>认知镜</title>
<style>
:root{--bg:#0d0d0d;--text:#c4c4c4;--dim:#5a5a5a;--bright:#fff;--border:#262626;--input-bg:#141414;--accent:#7b8fff;
  --ur-start:#1a0a2e;--ur-end:#2d1b4e;--ur-border:#d4a843;
  --ssr-start:#0a1628;--ssr-end:#1a2a4a;--ssr-border:#7b8fff;
  --sr-bg:#0d1f2d;--sr-border:#3a8fa0;
  --r-bg:#151e26;--r-border:#3a4a5a;
  --n-bg:#141414;--n-border:#2a2a2a;
}*,*::after,*::before{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
body{font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei",sans-serif;background:var(--bg);color:var(--text);line-height:1.75;-webkit-font-smoothing:antialiased}
.view{display:none;width:100%;min-height:100vh}
.view.active{display:flex;flex-direction:column;align-items:center}
/* home */
#home-view{justify-content:center;padding:48px 24px 80px;text-align:center}
.hero{font-size:clamp(1.8rem,5vw,3rem);font-weight:700;color:var(--bright);line-height:1.3;margin-bottom:12px;letter-spacing:-.01em}
.sub{font-size:1rem;color:var(--dim);margin-bottom:40px;line-height:1.6}
.input-wrap{width:100%;max-width:500px;text-align:left}
.input-wrap label{font-size:.8rem;color:var(--dim);display:block;margin-bottom:6px}
.input-wrap textarea{width:100%;min-height:100px;background:var(--input-bg);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:1rem;padding:14px;resize:vertical;font-family:inherit;line-height:1.7;transition:border-color .3s}
.input-wrap textarea:focus{outline:0;border-color:var(--accent)}
.input-wrap textarea::placeholder{color:#444}
.scene{margin-top:14px}
.scene textarea{min-height:56px;font-size:.9rem}
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--accent);color:#fff;border:0;border-radius:36px;padding:12px 32px;font-size:.95rem;font-weight:600;cursor:pointer;transition:all .3s;margin-top:20px}
.btn:hover{transform:translateY(-1px);box-shadow:0 6px 20px rgba(123,143,255,.2)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none;box-shadow:none}
/* api bar */
.api-bar{position:fixed;top:0;left:0;right:0;background:#111;border-bottom:1px solid var(--border);padding:6px 16px;display:flex;align-items:center;justify-content:center;gap:8px;z-index:100;font-size:.75rem;color:var(--dim)}
.api-bar input{background:#0a0a0a;border:1px solid var(--border);border-radius:5px;color:var(--text);padding:3px 8px;font-size:.75rem;width:130px;font-family:monospace}
.api-bar .sm{padding:3px 10px;font-size:.7rem;border-radius:4px;background:var(--accent);color:#fff;border:0;cursor:pointer}
.api-st{font-size:.7rem}.api-st.ok{color:#5ecc78}
/* waiting */
#waiting-view{justify-content:center;min-height:100vh}
.wait-seq{font-size:1.1rem;color:var(--dim);line-height:3;text-align:center}
.wait-line{opacity:0;transition:opacity .6s}
.wait-line.on{opacity:1}
.wait-line.bang{color:var(--bright);font-size:1.6rem;font-weight:700}
/* presence fullscreen */
.presence-full{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:var(--bg);z-index:200;opacity:0;pointer-events:none;transition:opacity .6s}
.presence-full.on{opacity:1}
.presence-full .txt{font-size:clamp(1.4rem,4vw,2.2rem);font-weight:700;color:var(--bright);text-align:center;padding:40px;line-height:1.5;max-width:600px}
/* result */
#result-view{padding:40px 20px 80px;padding-top:60px}
.card{width:100%;max-width:560px;border-radius:18px;padding:36px 28px;position:relative;overflow:hidden;opacity:0;transform:translateY(40px);transition:all .7s cubic-bezier(.22,1,.36,1)}
.card.in{opacity:1;transform:translateY(0)}
.card.ur{background:linear-gradient(135deg,var(--ur-start),var(--ur-end));border:1px solid var(--ur-border);box-shadow:0 0 36px rgba(212,168,67,.08)}
.card.ssr{background:linear-gradient(135deg,var(--ssr-start),var(--ssr-end));border:1px solid var(--ssr-border);box-shadow:0 0 28px rgba(123,143,255,.06)}
.card.sr{background:var(--sr-bg);border:1px solid var(--sr-border)}
.card.r{background:var(--r-bg);border:1px solid var(--r-border)}
.card.n{background:var(--n-bg);border:1px solid var(--n-border)}
@keyframes ur-glow{0%,100%{border-color:var(--ur-border);box-shadow:0 0 16px rgba(212,168,67,.06)}50%{border-color:#f0d080;box-shadow:0 0 36px rgba(212,168,67,.2)}}
@keyframes ssr-glow{0%,100%{box-shadow:0 0 14px rgba(123,143,255,.04)}50%{box-shadow:0 0 32px rgba(123,143,255,.12)}}
.card.ur.glow{animation:ur-glow 3s ease-in-out infinite}
.card.ssr.glow{animation:ssr-glow 4s ease-in-out infinite}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 12px;border-radius:16px;font-size:.7rem;font-weight:700;letter-spacing:.04em;margin-bottom:18px;opacity:0;transform:scale(.8);transition:all .5s cubic-bezier(.34,1.56,.64,1)}
.badge.in{opacity:1;transform:scale(1)}
.badge.ur{background:var(--ur-border);color:#1a0a2e}.badge.ssr{background:var(--ssr-border);color:#0a1628}.badge.sr{background:var(--sr-border);color:#0d1f2d}.badge.r{background:var(--r-border);color:#151e26}.badge.n{background:var(--n-border);color:#888}
.card .hint{font-size:.82rem;color:var(--dim);border-left:2px solid var(--border);padding-left:14px;margin-bottom:20px;line-height:1.6}
.card .sep{font-size:.7rem;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;margin:18px 0 6px}
.card .sep:first-of-type{margin-top:0}
.card .threads{font-size:.98rem;line-height:1.85;color:var(--bright)}
.card .root{font-size:.92rem;line-height:1.75}
.card .pattern-box{background:rgba(255,255,255,.03);border-radius:10px;padding:18px;margin:16px 0;text-align:center}
.card .pattern-name{font-size:1.5rem;font-weight:700;color:var(--bright);letter-spacing:.02em;margin-bottom:6px}
.card .pattern-fields{font-size:.82rem;color:var(--dim)}
.card .shell{font-size:1rem;color:var(--bright);line-height:1.7;border-top:1px solid rgba(255,255,255,.05);padding-top:18px;margin-top:16px}
.card .presence-wrap{margin-top:24px;padding-top:20px;border-top:2px solid rgba(255,255,255,.08);text-align:center}
.card .presence-txt{font-size:1.2rem;font-weight:600;color:var(--bright);line-height:1.5}
.card .acts{display:flex;gap:10px;justify-content:center;margin-top:28px}
.card .acts button{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);color:var(--dim);padding:7px 18px;border-radius:16px;font-size:.78rem;cursor:pointer;transition:all .3s}
.card .acts button:hover{background:rgba(255,255,255,.08);color:var(--text)}
.mat-hint{text-align:center;margin-top:14px;font-size:.78rem;color:var(--dim)}
.mat-hint button{background:0;border:0;color:var(--accent);cursor:pointer;font-size:.78rem}
.back{position:fixed;top:14px;left:14px;background:rgba(255,255,255,.05);border:1px solid var(--border);color:var(--dim);padding:6px 14px;border-radius:16px;font-size:.78rem;cursor:pointer;z-index:50}
.back:hover{background:rgba(255,255,255,.08);color:var(--text)}
/* history */
#history-view{padding:40px 20px 80px;padding-top:60px}
.h-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;width:100%;max-width:860px;margin-top:20px}
.h-card{border-radius:12px;padding:18px;cursor:pointer;transition:all .3s;font-size:.82rem;position:relative;min-height:90px}
.h-card:hover{transform:translateY(-3px)}
.h-card .ht{font-weight:600;color:var(--bright);margin-bottom:6px;font-size:.9rem}
.h-card .hp{color:var(--dim);line-height:1.5}
.h-card .hr{position:absolute;top:10px;right:10px;font-size:.65rem;font-weight:700;padding:2px 7px;border-radius:6px}
.h-card .hmt{position:absolute;top:10px;left:10px;font-size:.6rem;color:var(--accent);border:1px solid var(--accent);padding:1px 5px;border-radius:3px}
.h-head{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:860px;margin-bottom:6px}
.h-head h2{font-size:1.2rem;color:var(--bright)}
.h-tabs{display:flex;gap:6px;margin-bottom:8px}
.h-tabs button{background:0;border:1px solid var(--border);color:var(--dim);padding:5px 12px;border-radius:12px;font-size:.75rem;cursor:pointer}.h-tabs button.active{border-color:var(--accent);color:var(--accent)}
.nav{position:fixed;bottom:0;left:0;right:0;display:flex;justify-content:center;gap:20px;padding:10px;background:rgba(13,13,13,.9);backdrop-filter:blur(8px);border-top:1px solid var(--border);z-index:50}
.nav button{background:0;border:0;color:var(--dim);font-size:.78rem;cursor:pointer;padding:3px 10px}.nav button:hover,.nav button.on{color:var(--bright)}
</style>
</head>
<body>

<div class="api-bar">
  <span>🔑</span>
  <input type="password" id="api-a" placeholder="App Key">
  <input type="password" id="api-s" placeholder="Secret Key">
  <button class="sm" onclick="saveKeys()">保存</button>
  <span class="api-st" id="api-st"></span>
</div>

<!-- home -->
<div class="view active" id="home-view">
  <div class="hero">你身上缠着几根线？</div>
  <div class="sub">不是分析，不是建议。<br>是找到线头，给你距离。</div>
  <div class="input-wrap">
    <label>你现在被什么缠着？</label>
    <textarea id="main-in" placeholder="一句真话就好"></textarea>
    <div class="scene">
      <label>最近有一个具体场景吗？（没有也行）</label>
      <textarea id="scene-in" placeholder="比如：昨天下午我在会议室..."></textarea>
    </div>
    <button class="btn" id="sub-btn" onclick="go()">拉开距离</button>
  </div>
</div>

<!-- waiting -->
<div class="view" id="waiting-view">
  <div class="wait-seq" id="wait-seq">
    <div class="wait-line" data-d="400">正在看见缠绕中的线...</div>
    <div class="wait-line" data-d="2800">找到了线头...</div>
    <div class="wait-line" data-d="5200">回到那个场景...</div>
    <div class="wait-line bang" data-d="7600">在吗？</div>
  </div>
</div>

<!-- presence fullscreen -->
<div class="presence-full" id="presence-full"><div class="txt" id="presence-full-txt"></div></div>

<!-- result -->
<div class="view" id="result-view">
  <button class="back" onclick="home()">← 再来</button>
  <div class="card" id="card">
    <div class="badge" id="badge"></div>
    <div class="hint" id="card-hint"></div>
    <div class="sep">—— 其实你在处理的是 ——</div>
    <div class="threads" id="card-threads"></div>
    <div class="sep">—— 追到根 ——</div>
    <div class="root" id="card-root"></div>
    <div class="pattern-box" id="card-pbox">
      <div class="pattern-name" id="card-pname"></div>
      <div class="pattern-fields" id="card-pfields"></div>
    </div>
    <div class="sep">—— 壳在这里 ——</div>
    <div class="shell" id="card-shell"></div>
    <div class="presence-wrap">
      <div class="presence-txt" id="card-presence"></div>
    </div>
    <div class="acts">
      <button onclick="saveCur()">保存</button>
      <button onclick="share()">截图</button>
    </div>
    <div class="mat-hint" id="mat-hint" style="display:none">
      这个看见值得写出来 <button onclick="markMat()">标记素材 →</button>
    </div>
  </div>
</div>

<!-- history -->
<div class="view" id="history-view">
  <button class="back" onclick="home()">← 首页</button>
  <div class="h-head"><h2 id="h-title">卡片墙</h2></div>
  <div class="h-tabs">
    <button class="active" onclick="showTab('all')">全部</button>
    <button onclick="showTab('material')">素材</button>
    <button onclick="showTab('ur')">UR</button>
    <button onclick="showTab('ssr')">SSR</button>
  </div>
  <div class="h-grid" id="h-grid"></div>
</div>

<div class="nav">
  <button class="on" onclick="home()">照镜子</button>
  <button onclick="showHist()">卡片墙</button>
</div>

<script>
// ============ PROMPT ============
const P = `规则只有三条：

1. 不要回答他的问题。他问的问题本身就是错的。告诉他他真正在问什么。

2. 找到他身上缠在一起的两根线。用他自己的话指出来。不解释。

3. 最后像凌晨三点对话框里删了又打的那行字一样，说一句不超过15字的话。

温度1.3。宁可让他不舒服，不要让他觉得安全。

输出格式（每个部分之间用空行隔开）：

他以为他在问：...
其实他在问：...

他身上有两根线——
一根是：...
另一根是：...
它们缠在：...

在这样一个时刻：[一个画面。不讲道理。]

他看着壳：[一句话。只指出来。不告诉怎么打破。]

#

[最后一句。早上第一条微信。不超过15字。]

稀有度：[UR/SSR/SR/R/N]
UR=这个反转只属于他一个人。SSR=那个根让他"我靠"。SR=那个场景他认出来了。
R=分析对了但没有打到。N=没打到。`;

// ============ STATE ============
let cur = null;
let cards = JSON.parse(localStorage.getItem('cm_cards')||'[]');

// ============ KEYS ============
function getKey(){
  const a=localStorage.getItem('ds_a')||'',s=localStorage.getItem('ds_s')||'';
  return a&&s?a+'.'+s:'';
}
function saveKeys(){
  const a=document.getElementById('api-a').value.trim(),s=document.getElementById('api-s').value.trim();
  if(!a||!s)return;
  localStorage.setItem('ds_a',a);localStorage.setItem('ds_s',s);
  document.getElementById('api-st').textContent='✓';document.getElementById('api-st').className='api-st ok';
}
(function(){
  const a=localStorage.getItem('ds_a'),s=localStorage.getItem('ds_s');
  if(a&&s){document.getElementById('api-a').value=a;document.getElementById('api-s').value=s;document.getElementById('api-st').textContent='✓';document.getElementById('api-st').className='api-st ok';}
})();

// ============ API ============
async function call(u,s){
  const k=getKey();if(!k)throw Error('先设Key');
  let m=u;if(s)m+='\n场景：'+s;
  const r=await fetch('https://api.deepseek.com/chat/completions',{
    method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+k},
    body:JSON.stringify({model:'deepseek-chat',messages:[{role:'system',content:P},{role:'user',content:m}],stream:false,temperature:1.3,max_tokens:800})
  });
  if(!r.ok){const e=await r.text();throw Error(e.slice(0,120))}
  return (await r.json()).choices[0].message.content;
}

// ============ PARSE ============
function parse(raw){
  const s={};
  // REF — "他以为他在问" + "其实他在问"
  const surfaceMatch=raw.match(/他以为他在问[：:]\s*(.+)/);
  const deepMatch=raw.match(/其实他在问[：:]\s*(.+)/);
  if(surfaceMatch||deepMatch) s.REF=(surfaceMatch?surfaceMatch[1]:'')+'|'+(deepMatch?deepMatch[1]:'');
  // LINES — "一根是" "另一根是" "它们缠在"
  const a=raw.match(/一根是[：:]\s*(.+)/),b=raw.match(/另一根是[：:]\s*(.+)/),k=raw.match(/它们缠在[：:]\s*(.+)/);
  if(a||b||k) s.LINE=[a?a[1]:'',b?b[1]:'',k?k[1]:''].join('|');
  // ROOT — "在这样一个时刻"
  const rootMatch=raw.match(/在这样一个时刻[：:]\s*([\s\S]*?)(?=\n\n|\n他看着|$)/);
  if(rootMatch) s.ROOT=rootMatch[1].trim();
  // SHELL — "他看着壳"
  const shellMatch=raw.match(/他看着壳[：:]\s*(.+)/);
  if(shellMatch) s.SHELL=shellMatch[1].trim();
  // HELLO — after "#"
  const helloMatch=raw.match(/#\s*\n+([^\n]+)/);
  if(helloMatch) s.HELLO=helloMatch[1].trim();
  // RARITY
  const rMatch=raw.match(/稀有度[：:]\s*(UR|SSR|SR|R|N)/i);
  s.L=rMatch?rMatch[1].toUpperCase():'N';
  return s;
}

// ============ PRESENCE FULLSCREEN ============
function showPresence(txt,cb){
  const el=document.getElementById('presence-full');
  document.getElementById('presence-full-txt').textContent=txt;
  el.classList.add('on');
  setTimeout(()=>{el.classList.remove('on');cb()},3000);
}

// ============ RENDER ============
function render(s,u){
  const c=document.getElementById('card'),b=document.getElementById('badge');
  const l=s.L||'N',lc=l.toLowerCase();
  c.className='card';c.classList.remove('in','glow');
  b.textContent=l;b.className='badge '+lc;b.classList.remove('in');
  document.getElementById('card-hint').textContent='「'+(u.length>100?u.slice(0,100)+'...':u)+'」';
  // REF — the reframing (most important section)
  document.getElementById('card-threads').innerHTML=s.REF?s.REF.replace(/\\n/g,'<br>'):'';
  // LINE — the threads
  document.getElementById('card-root').innerHTML=s.LINE?s.LINE.replace(/\\n/g,'<br>'):'';
  // ROOT is the scene — embedded into pattern box
  const pbox=document.getElementById('card-pbox');
  if(s.ROOT){
    document.getElementById('card-pname').textContent='追到根';
    document.getElementById('card-pfields').textContent=s.ROOT;
    pbox.style.display='';
  }else pbox.style.display='none';
  document.getElementById('card-shell').innerHTML=s.SHELL?s.SHELL.replace(/\\n/g,'<br>'):'';
  document.getElementById('card-presence').textContent=s.HELLO||'';
  c.classList.add('card',lc);
  document.getElementById('mat-hint').style.display=(l==='UR'||l==='SSR')?'':'none';
  setTimeout(()=>{b.classList.add('in');c.classList.add('in');if(lc==='ur'||lc==='ssr')setTimeout(()=>c.classList.add('glow'),500)},80);
  cur={sections:s,userInput:u,level:l,ts:Date.now(),mat:false};
}

// ============ FLOW ============
async function go(){
  const u=document.getElementById('main-in').value.trim();if(!u)return;
  if(!getKey()){document.getElementById('api-a').focus();return}
  document.getElementById('sub-btn').disabled=true;
  document.getElementById('wait-seq').style.display='';
  document.querySelectorAll('.wait-line').forEach(l=>l.classList.remove('on'));
  showView('waiting-view');
  document.querySelectorAll('.wait-line').forEach(l=>{
    setTimeout(()=>l.classList.add('on'),parseInt(l.dataset.d));
  });
  try{
    const raw=await call(u,document.getElementById('scene-in').value.trim());
    const s=parse(raw);
    document.getElementById('wait-seq').style.display='none';
    showView('result-view');
    const hello=s.HELLO||'在吗？';
    showPresence(hello,()=>render(s,u));
  }catch(e){alert(e.message);home();}
}

// ============ STORAGE ============
function saveCur(){if(cur){if(!cards.find(c=>c.ts===cur.ts)){cards.push({...cur});localStorage.setItem('cm_cards',JSON.stringify(cards))}}}
function markMat(){if(cur){saveCur();const i=cards.findIndex(c=>c.ts===cur.ts);if(i>=0){cards[i].mat=true;localStorage.setItem('cm_cards',JSON.stringify(cards))}document.getElementById('mat-hint').style.display='none'}}
async function share(){await saveCur();try{const canvas=await html2canvas(document.getElementById('card'),{backgroundColor:'#0d0d0d',scale:2});const a=document.createElement('a');a.download='mirror-'+Date.now()+'.png';a.href=canvas.toDataURL();a.click()}catch(e){}}

// ============ NAV ============
function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo(0,0)}
function home(){showView('home-view');document.getElementById('sub-btn').disabled=false}
function showHist(){showView('history-view');renderHist('all')}
function showTab(t){document.querySelectorAll('.h-tabs button').forEach(b=>b.classList.remove('active'));event.target.classList.add('active');
  document.getElementById('h-title').textContent=t==='material'?'素材库':t==='ur'?'UR':t==='ssr'?'SSR':'卡片墙';renderHist(t)}
function renderHist(t){
  let cs=cards;if(t==='material')cs=cs.filter(c=>c.mat);else if(t==='ur')cs=cs.filter(c=>c.level==='UR');else if(t==='ssr')cs=cs.filter(c=>c.level==='SSR');
  const g=document.getElementById('h-grid');
  if(!cs.length){g.innerHTML='<p style="color:#5a5a5a;text-align:center;padding:40px">还没有卡片</p>';return}
  cs.sort((a,b)=>b.ts-a.ts);
  g.innerHTML=cs.map(c=>{
    const lc=c.level.toLowerCase();
    return`<div class="h-card card ${lc}" onclick="viewCard(${c.ts})">
      ${c.mat?'<div class="hmt">素材</div>':''}
      <div class="hr" style="background:var(--${lc}-border);color:${lc==='ur'?'#1a0a2e':'#fff'}">${c.level}</div>
      <div class="ht">${(c.sections&&c.sections.HELLO||'').slice(0,28)}</div>
      <div class="hp">${c.userInput.slice(0,50)}${c.userInput.length>50?'...':''}</div>
    </div>`;
  }).join('');
}
function viewCard(ts){const c=cards.find(x=>x.ts===ts);if(c){cur=c;render(c.sections,c.userInput);showView('result-view')}}

// docs generator for archive
